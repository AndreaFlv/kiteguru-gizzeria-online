name: Collect forecast and truth

on:
  schedule:
    - cron: "15 20 * * *"
      timezone: "Europe/Rome"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kiteguru-daily-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python cloud/collect_and_evaluate.py
      - name: Commit inspectable artifacts
        run: |
          git config user.name "kiteguru-collector[bot]"
          git config user.email "kiteguru-collector[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && exit 0
          git commit -m "data: daily forecast and observations"
          git push
